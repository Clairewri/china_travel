<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>China Travel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      padding: 12px 20px; height: 52px;
      background: linear-gradient(90deg, #c0392b, #922b21);
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4); z-index: 1000; flex-shrink: 0;
    }
    header span { font-size: 1.3rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p { font-size: 0.7rem; opacity: 0.8; margin-top: 1px; }

    #map { flex: 1; z-index: 1; }

    /* ── Map icons ── */
    .map-icon {
      font-size: 24px; cursor: pointer;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8));
      transition: transform 0.2s ease, opacity 0.3s ease;
      animation: gentle-float 3.5s ease-in-out infinite;
      text-align: center; line-height: 1;
    }
    .map-icon:hover {
      transform: scale(1.4);
      filter: drop-shadow(0 4px 12px rgba(231,76,60,0.5));
      animation: none;
    }
    .map-icon.zoom-hidden {
      opacity: 0; pointer-events: none; transform: scale(0.2);
    }
    @keyframes gentle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* ── Tooltips ── */
    .custom-tooltip {
      background: rgba(20, 22, 34, 0.95) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 10px !important;
      padding: 7px 12px !important;
      font-size: 0.78rem !important;
      color: #fff !important;
      font-weight: 600 !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
      letter-spacing: 0.2px !important;
    }
    .custom-tooltip .tooltip-city {
      color: rgba(255,255,255,0.45);
      font-weight: 400;
      font-size: 0.68rem;
    }
    .leaflet-tooltip-top:before,
    .leaflet-tooltip-bottom:before,
    .leaflet-tooltip-left:before,
    .leaflet-tooltip-right:before {
      border: none !important;
    }

    /* ── Side panel ── */
    .side-panel {
      position: fixed;
      top: 52px; right: 0; bottom: 0;
      width: 360px; max-width: 92vw;
      background: #1a1d27;
      border-left: 1px solid rgba(255,255,255,0.07);
      box-shadow: -12px 0 40px rgba(0,0,0,0.55);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 900;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .side-panel.open { transform: translateX(0); }
    .side-panel::-webkit-scrollbar { width: 5px; }
    .side-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    .panel-close {
      position: absolute; top: 12px; right: 14px;
      background: rgba(255,255,255,0.08); border: none;
      color: #fff; font-size: 17px;
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .panel-close:hover { background: rgba(255,255,255,0.18); }

    .panel-hero {
      width: 100%; height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; flex-shrink: 0; position: relative;
    }
    .panel-hero img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    .panel-hero .hero-emoji { position: relative; z-index: 1; text-shadow: 0 4px 16px rgba(0,0,0,0.5); }

    .panel-body { padding: 18px 20px 28px; }
    .panel-body h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .panel-city { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 12px; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
    .tag {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.28);
      color: #f1948a; font-size: 0.67rem; padding: 2px 9px;
      border-radius: 20px; font-weight: 500;
    }

    .panel-section { margin-bottom: 18px; }
    .panel-section h3 {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
      color: rgba(255,255,255,0.35); margin-bottom: 9px;
    }
    .panel-section p { font-size: 0.83rem; color: rgba(255,255,255,0.72); line-height: 1.65; }

    .info-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
    .info-item .i-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .info-item .i-text { font-size: 0.8rem; color: rgba(255,255,255,0.72); line-height: 1.55; }
    .info-item .i-label { font-weight: 600; color: #fff; }

    .panel-links {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .panel-link {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 6px 13px;
      font-size: 0.73rem; color: rgba(255,255,255,0.65);
      text-decoration: none; cursor: pointer; transition: all 0.2s;
    }
    .panel-link:hover { background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.4); color: #fff; }

    .section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 4px 0 16px; }
  </style>
</head>

        tags: ["Braised Pork Belly", "Song Dynasty Recipe", "Poet's Dish"],
        sections: [
          { title: "The Story", type: "text", content: "Named after Su Dongpo, a Song Dynasty poet who allegedly invented this while serving as governor of Hangzhou. Pork belly braised for hours until it melts. The fat is the point — silky and sweet when done right." }
        ],
        links: [{ label: "▶ Recipe Story", url: "#" }]
      }
    ]
  }
];

// ─── MAP SETUP ──────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [33.5, 107],
  zoom: 5,
  zoomControl: true,
  minZoom: 3
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

// ─── CHINA PROVINCES & BOUNDARY ─────────────────────────────────────────────
fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      style: { color: 'rgba(255,255,255,0.15)', weight: 0.8, fillOpacity: 0 }
    }).addTo(map);
  }).catch(() => {});

fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000.json')
  .then(r => r.json())
  .then(chinaData => {
    L.geoJSON(chinaData, {
      style: { color: 'rgba(192,57,43,0.5)', weight: 2, fillOpacity: 0 }
    }).addTo(map);
    try {
      const worldBox = turf.polygon([[ [-180,-85],[180,-85],[180,85],[-180,85],[-180,-85] ]]);
      let f = chinaData.type === 'FeatureCollection' ? chinaData.features[0] : chinaData;
      const mask = turf.difference(worldBox, f);
      if (mask) L.geoJSON(mask, { style: { fillColor: '#000', fillOpacity: 0.42, color: 'none', weight: 0 } }).addTo(map);
    } catch(e){}
  }).catch(() => {});

// ─── PLACE ALL ICONS ────────────────────────────────────────────────────────
// Simple: each landmark is one icon on the map. Zoom controls visibility.
cities.forEach(city => {
  city.landmarks.forEach(lm => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-icon" data-minzoom="${lm.minZoom}">${lm.emoji}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    const marker = L.marker([lm.lat, lm.lng], { icon }).addTo(map);

    // Tooltip: shows city + landmark name on hover
    marker.bindTooltip(
      `<span class="tooltip-city">${city.name}</span><br>${lm.emoji} ${lm.name}`,
      { className: 'custom-tooltip', direction: 'right', offset: [14, 0] }
    );

    // Click: open side panel
    marker.on('click', () => openPanel(lm, city.name));
  });
});

// ─── ZOOM VISIBILITY ────────────────────────────────────────────────────────
function updateZoomVisibility() {
  const zoom = map.getZoom();
  document.querySelectorAll('.map-icon').forEach(el => {
    const minZoom = parseInt(el.dataset.minzoom);
    el.classList.toggle('zoom-hidden', zoom < minZoom);
  });
}
map.on('zoomend', updateZoomVisibility);
setTimeout(updateZoomVisibility, 300);

// ─── SIDE PANEL ─────────────────────────────────────────────────────────────
function openPanel(lm, cityName) {
  const panel = document.getElementById('sidePanel');
  const content = document.getElementById('panelContent');

  let heroHtml = `<div class="panel-hero" style="background:${lm.heroColor}">`;
  if (lm.imageUrl) {
    heroHtml += `<img src="${lm.imageUrl}" alt="${lm.name}" /><span class="hero-emoji">${lm.emoji}</span>`;
  } else {
    heroHtml += `<span class="hero-emoji">${lm.emoji}</span>`;
  }
  heroHtml += `</div>`;

  const tags = lm.tags.map(t => `<span class="tag">${t}</span>`).join('');

  let sectionsHtml = '';
  lm.sections.forEach(s => {
    sectionsHtml += `<div class="panel-section"><h3>${s.title}</h3>`;
    if (s.type === 'text') {
      sectionsHtml += `<p>${s.content}</p>`;
    } else if (s.type === 'items') {
      s.items.forEach(item => {
        sectionsHtml += `<div class="info-item">
          <div class="i-icon">${item.icon}</div>
          <div class="i-text"><span class="i-label">${item.label}:</span> ${item.text}</div>
        </div>`;
      });
    }
    sectionsHtml += `</div><hr class="section-divider">`;
  });

  let linksHtml = '';
  if (lm.links?.length) {
    linksHtml = `<div class="panel-links">` +
      lm.links.map(l => `<a class="panel-link" href="${l.url}" target="_blank">${l.label}</a>`).join('') +
      `</div>`;
  }

  content.innerHTML = `
    ${heroHtml}
    <div class="panel-body">
      <h2>${lm.name}</h2>
      <div class="panel-city">📍 ${cityName}</div>
      <div class="tag-row">${tags}</div>
      ${sectionsHtml}
      ${linksHtml}
    </div>`;

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
</body>
</html>
