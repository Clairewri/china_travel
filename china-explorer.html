<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore China</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      padding: 12px 20px;
      background: linear-gradient(90deg, #c0392b, #922b21);
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4); z-index: 1000;
    }
    header span { font-size: 1.4rem; }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    header p { font-size: 0.72rem; opacity: 0.8; margin-top: 1px; }

    #map { flex: 1; z-index: 1; }

    /* Floating city labels */
    .city-label {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.55);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      pointer-events: auto; cursor: pointer;
      transition: all 0.3s ease; white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .city-label:hover, .city-label.active {
      color: #fff; font-size: 15px;
      text-shadow: 0 0 12px rgba(231,76,60,0.6), 0 1px 4px rgba(0,0,0,0.8);
    }
    .city-label.dimmed { opacity: 0.25; font-size: 11px; }

    /* Floating icons on default state */
    .float-icon {
      font-size: 22px; cursor: pointer;
      transition: all 0.35s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      animation: gentle-float 3s ease-in-out infinite;
    }
    .float-icon.hidden { opacity: 0; transform: scale(0.3); pointer-events: none; }
    .float-icon.dimmed { opacity: 0.15; pointer-events: none; }
    @keyframes gentle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Expanded landmark items (on city hover) */
    .landmark-item {
      display: flex; align-items: center; gap: 6px;
      background: rgba(26,29,39,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 5px 10px 5px 6px;
      cursor: pointer; white-space: nowrap;
      opacity: 0; transform: scale(0.5); pointer-events: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .landmark-item.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
    .landmark-item:hover { background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.4); }
    .landmark-item .lm-thumb {
      width: 32px; height: 32px; border-radius: 6px;
      object-fit: cover; background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .landmark-item .lm-name { font-size: 0.72rem; color: rgba(255,255,255,0.85); font-weight: 600; }

    /* Detail card overlay */
    .detail-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 2000;
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .detail-overlay.open { display: flex; }

    .detail-card {
      background: #1a1d27; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 16px 64px rgba(0,0,0,0.7);
      width: 380px; max-width: 92vw; max-height: 85vh;
      overflow-y: auto; position: relative;
    }

    .detail-close {
      position: absolute; top: 12px; right: 14px;
      background: rgba(0,0,0,0.4); border: none;
      color: #fff; font-size: 18px; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-close:hover { background: rgba(255,255,255,0.2); }

    .detail-hero {
      width: 100%; height: 180px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      border-radius: 20px 20px 0 0;
    }

    .detail-body { padding: 20px; }
    .detail-body h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 3px; }
    .detail-body .detail-city { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 14px; }

    .detail-section { margin-bottom: 16px; }
    .detail-section h3 {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.4); margin-bottom: 8px;
    }
    .detail-section p {
      font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.6;
    }

    .detail-item {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
    }
    .detail-item .d-icon { font-size: 1.1rem; flex-shrink: 0; }
    .detail-item .d-text { font-size: 0.82rem; color: rgba(255,255,255,0.75); line-height: 1.5; }
    .detail-item .d-label { font-weight: 600; color: #fff; }

    .detail-links {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;
      padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08);
    }
    .detail-link {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 6px 14px;
      font-size: 0.75rem; color: rgba(255,255,255,0.7);
      text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }
    .detail-link:hover { background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.4); color: #fff; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .tag {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.25);
      color: #f1948a; font-size: 0.68rem; padding: 2px 8px;
      border-radius: 16px; font-weight: 500;
    }

    /* Scrollbar */
    .detail-card::-webkit-scrollbar { width: 6px; }
    .detail-card::-webkit-scrollbar-track { background: transparent; }
    .detail-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body>

<header>

</div>

      },
      {
        name: "Dongpo Pork", emoji: "🐷", lat: 30.26, lng: 120.17,
        heroColor: "#880E4F",
        tags: ["Braised Pork Belly", "Song Dynasty Recipe", "Poet's Dish"],
        sections: [
          { title: "The Story", type: "text", content: "Named after Su Dongpo, a Song Dynasty poet who allegedly invented this dish while serving as governor of Hangzhou. Pork belly braised for hours until it melts in your mouth. The fat is the point — silky, sweet, and not greasy when done right." },
        ],
        links: [{ label: "▶ Recipe Story", url: "#" }]
      }
    ]
  }
];

// ===== MAP SETUP =====
const map = L.map('map', { center: [33, 106], zoom: 5, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

let activeCity = null;
const cityGroups = {};

cities.forEach(city => {
  const group = { label: null, floatIcons: [], landmarkItems: [] };

  // City label
  const labelIcon = L.divIcon({
    className: '',
    html: `<div class="city-label" data-city="${city.name}">${city.name}</div>`,
    iconSize: [0, 0], iconAnchor: [0, 8]
  });
  group.label = L.marker([city.lat, city.lng], { icon: labelIcon, interactive: true }).addTo(map);

  // Float icons (default visible)
  city.landmarks.forEach((lm, i) => {
    const angle = (i / city.landmarks.length) * Math.PI * 2 - Math.PI / 2;
    const r = 0.15;
    const fIcon = L.divIcon({
      className: '',
      html: `<div class="float-icon" data-city="${city.name}" style="animation-delay:${i * 0.4}s">${lm.emoji}</div>`,
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    const fMarker = L.marker([lm.lat, lm.lng], { icon: fIcon, interactive: false }).addTo(map);
    group.floatIcons.push(fMarker);
  });

  // Landmark items (visible on hover)
  city.landmarks.forEach((lm, i) => {
    const liIcon = L.divIcon({
      className: '',
      html: `<div class="landmark-item" data-city="${city.name}" data-lm="${i}">
               <div class="lm-thumb">${lm.emoji}</div>
               <div class="lm-name">${lm.name}</div>
             </div>`,
      iconSize: [0, 0], iconAnchor: [-20, 16]
    });
    const liMarker = L.marker([lm.lat, lm.lng], { icon: liIcon, interactive: true }).addTo(map);
    group.landmarkItems.push(liMarker);
  });

  cityGroups[city.name] = group;
});

// ===== INTERACTION =====
function activateCity(cityName) {
  if (activeCity === cityName) return;
  activeCity = cityName;

  Object.entries(cityGroups).forEach(([name, g]) => {
    const isActive = name === cityName;
    const labelEl = g.label.getElement()?.querySelector('.city-label');
    if (labelEl) {
      labelEl.classList.toggle('active', isActive);
      labelEl.classList.toggle('dimmed', !isActive);
    }
    g.floatIcons.forEach(m => {
      const el = m.getElement()?.querySelector('.float-icon');
      if (el) { el.classList.toggle('hidden', isActive); el.classList.toggle('dimmed', !isActive); }
    });
    g.landmarkItems.forEach(m => {
      const el = m.getElement()?.querySelector('.landmark-item');
      if (el) el.classList.toggle('visible', isActive);
    });
  });
}

function deactivateAll() {
  activeCity = null;
  Object.values(cityGroups).forEach(g => {
    const labelEl = g.label.getElement()?.querySelector('.city-label');
    if (labelEl) { labelEl.classList.remove('active', 'dimmed'); }
    g.floatIcons.forEach(m => {
      const el = m.getElement()?.querySelector('.float-icon');
      if (el) { el.classList.remove('hidden', 'dimmed'); }
    });
    g.landmarkItems.forEach(m => {
      const el = m.getElement()?.querySelector('.landmark-item');
      if (el) el.classList.remove('visible');
    });
  });
}

// Hover/click events via delegation
document.addEventListener('mouseover', e => {
  const cityEl = e.target.closest('[data-city]');
  if (cityEl) activateCity(cityEl.dataset.city);
});

document.addEventListener('click', e => {
  const lmEl = e.target.closest('.landmark-item');
  if (lmEl) {
    const cityName = lmEl.dataset.city;
    const lmIdx = parseInt(lmEl.dataset.lm);
    const city = cities.find(c => c.name === cityName);
    if (city) openDetail(city.landmarks[lmIdx]);
    return;
  }
  // Click on map background deactivates
  if (e.target.closest('#map') && !e.target.closest('[data-city]') && !e.target.closest('.leaflet-control')) {
    deactivateAll();
  }
});

// ===== DETAIL CARD =====
function openDetail(lm) {
  const overlay = document.getElementById('detailOverlay');
  const content = document.getElementById('detailContent');

  let html = `<div class="detail-hero" style="background:${lm.heroColor}">${lm.emoji}</div>`;
  html += `<div class="detail-body">`;
  html += `<h2>${lm.name}</h2>`;
  html += `<div class="tag-row">${lm.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;

  lm.sections.forEach(s => {
    html += `<div class="detail-section"><h3>${s.title}</h3>`;
    if (s.type === 'text') {
      html += `<p>${s.content}</p>`;
    } else if (s.type === 'items') {
      s.items.forEach(item => {
        html += `<div class="detail-item"><div class="d-icon">${item.icon}</div><div class="d-text"><span class="d-label">${item.label}:</span> ${item.text}</div></div>`;
      });
    }
    html += `</div>`;
  });

  if (lm.links) {
    html += `<div class="detail-links">`;
    lm.links.forEach(link => {
      html += `<a class="detail-link" href="${link.url}" target="_blank">${link.label}</a>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  content.innerHTML = html;
  overlay.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
</script>
